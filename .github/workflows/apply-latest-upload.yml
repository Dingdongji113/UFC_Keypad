name: Apply latest UFC Keypad upload

on:
  push:
    paths:
      - '.github/workflows/apply-latest-upload.yml'

permissions:
  contents: write

jobs:
  apply-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode and apply uploaded source files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import shutil
          import tarfile

          root = Path.cwd().resolve()
          payload_dir = root / '.sync_payload'
          parts = sorted(payload_dir.glob('part*'))
          if not parts:
              raise SystemExit('No staged payload parts found')

          encoded = ''.join(part.read_text(encoding='utf-8').strip() for part in parts)
          archive = Path('/tmp/ufc_latest_changes.tar.xz')
          archive.write_bytes(base64.b64decode(encoded, validate=True))

          unpacked = Path('/tmp/ufc_latest_changes')
          if unpacked.exists():
              shutil.rmtree(unpacked)
          unpacked.mkdir(parents=True)

          with tarfile.open(archive, 'r:xz') as tf:
              for member in tf.getmembers():
                  target = (unpacked / member.name).resolve()
                  if unpacked not in target.parents and target != unpacked:
                      raise RuntimeError(f'Unsafe archive path: {member.name}')
              tf.extractall(unpacked)

          copied = []
          for src in unpacked.rglob('*'):
              if not src.is_file():
                  continue
              rel = src.relative_to(unpacked)
              dst = root / rel
              dst.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(src, dst)
              copied.append(str(rel).replace('\\', '/'))

          shutil.rmtree(payload_dir)
          workflow = root / '.github/workflows/apply-latest-upload.yml'
          workflow.unlink()

          print('Applied files:')
          for path in copied:
              print(f'  {path}')
          PY

      - name: Commit synchronized latest version
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "feat: sync latest cold start timing, flaps and RDDI fixes"
          git push
